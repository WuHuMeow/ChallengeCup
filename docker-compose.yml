# 单容器编排。默认运行路口 16 的固定配时示例。
# 用法：docker compose up --build
#       docker compose run --rm simulation 1
services:
  simulation:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: ca-mp:latest
    volumes:
      - ./output:/app/output
      - ./experiments/results:/app/experiments/results
    command: ["16"]
