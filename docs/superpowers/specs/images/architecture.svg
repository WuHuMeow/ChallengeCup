<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/><stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/><stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="vehicleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/><stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#667eea"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f5576c"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#4facfe"/></marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc"/>
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a202c">CA-MP 云-边-端三层协同架构</text>
  <!-- Cloud -->
  <rect x="100" y="55" width="600" height="140" rx="12" fill="url(#cloudGrad)" opacity="0.12" filter="url(#shadow)"/>
  <rect x="100" y="55" width="600" height="140" rx="12" fill="none" stroke="#667eea" stroke-width="2"/>
  <text x="120" y="80" font-size="14" font-weight="bold" fill="#667eea">Cloud Layer（云端）</text>
  <rect x="130" y="92" width="250" height="85" rx="8" fill="white" stroke="#667eea" stroke-width="1.5"/>
  <text x="255" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a5568">CloudCoordinator</text>
  <text x="255" y="135" text-anchor="middle" font-size="10" fill="#718096">全局压力评估 → 周期性下发参数</text>
  <text x="255" y="152" text-anchor="middle" font-size="10" fill="#718096">min_green / max_green / base_green</text>
  <text x="255" y="169" text-anchor="middle" font-size="10" fill="#718096">EWMA 流量预测 → 修正压力值</text>
  <rect x="420" y="92" width="250" height="85" rx="8" fill="white" stroke="#667eea" stroke-width="1.5"/>
  <text x="545" y="115" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a5568">EWMA Predictor</text>
  <text x="545" y="135" text-anchor="middle" font-size="10" fill="#718096">指数加权移动平均（α=0.3）</text>
  <text x="545" y="152" text-anchor="middle" font-size="10" fill="#718096">短期流量趋势预测</text>
  <text x="545" y="169" text-anchor="middle" font-size="10" fill="#718096">轻量级，无需 GPU</text>
  <!-- Arrow Cloud->Edge -->
  <path d="M400,195 L400,225" stroke="#667eea" stroke-width="2.5" marker-end="url(#arrP)"/>
  <text x="410" y="215" font-size="10" fill="#667eea">PredictionResult（周期性下发）</text>
  <!-- Edge -->
  <rect x="100" y="230" width="600" height="170" rx="12" fill="url(#edgeGrad)" opacity="0.10" filter="url(#shadow)"/>
  <rect x="100" y="230" width="600" height="170" rx="12" fill="none" stroke="#f5576c" stroke-width="2"/>
  <text x="120" y="255" font-size="14" font-weight="bold" fill="#f5576c">Edge Layer（边缘 / RSU）</text>
  <rect x="130" y="267" width="170" height="115" rx="8" fill="white" stroke="#f5576c" stroke-width="1.5"/>
  <text x="215" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a5568">EdgeNode</text>
  <text x="215" y="310" text-anchor="middle" font-size="10" fill="#718096">接收 V2X 消息</text>
  <text x="215" y="327" text-anchor="middle" font-size="10" fill="#718096">汇聚排队状态</text>
  <text x="215" y="344" text-anchor="middle" font-size="10" fill="#718096">调用算法决策</text>
  <text x="215" y="361" text-anchor="middle" font-size="10" fill="#718096">输出 ControlAction</text>
  <rect x="320" y="267" width="180" height="115" rx="8" fill="white" stroke="#f5576c" stroke-width="1.5"/>
  <text x="410" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a5568">CA-MP Controller</text>
  <text x="410" y="310" text-anchor="middle" font-size="10" fill="#718096">1. 溢出门控: occ>90%→强制放行</text>
  <text x="410" y="327" text-anchor="middle" font-size="10" fill="#718096">2. pressure = queue / capacity</text>
  <text x="410" y="344" text-anchor="middle" font-size="10" fill="#718096">3. 选最大压力相位</text>
  <text x="410" y="361" text-anchor="middle" font-size="10" fill="#718096">4. 动态绿灯时长</text>
  <rect x="520" y="267" width="160" height="115" rx="8" fill="white" stroke="#f5576c" stroke-width="1.5"/>
  <text x="600" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a5568">Baselines</text>
  <text x="600" y="315" text-anchor="middle" font-size="10" fill="#718096">FixedTime（固定配时）</text>
  <text x="600" y="335" text-anchor="middle" font-size="10" fill="#718096">Actuated（感应控制）</text>
  <text x="600" y="360" text-anchor="middle" font-size="10" fill="#718096">（对照组）</text>
  <!-- Arrow Edge->Vehicle -->
  <path d="M400,400 L400,430" stroke="#f5576c" stroke-width="2.5" marker-end="url(#arrR)"/>
  <text x="410" y="420" font-size="10" fill="#f5576c">ControlAction（相位+时长）</text>
  <!-- Vehicle -->
  <rect x="100" y="435" width="600" height="130" rx="12" fill="url(#vehicleGrad)" opacity="0.10" filter="url(#shadow)"/>
  <rect x="100" y="435" width="600" height="130" rx="12" fill="none" stroke="#4facfe" stroke-width="2"/>
  <text x="120" y="460" font-size="14" font-weight="bold" fill="#4facfe">Vehicle Layer（车端 / SUMO）</text>
  <rect x="130" y="472" width="250" height="75" rx="8" fill="white" stroke="#4facfe" stroke-width="1.5"/>
  <text x="255" y="495" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a5568">SUMO 仿真车辆</text>
  <text x="255" y="515" text-anchor="middle" font-size="10" fill="#718096">位置、速度、车道 → JointState</text>
  <text x="255" y="532" text-anchor="middle" font-size="10" fill="#718096">TraCI 实时状态读取</text>
  <rect x="420" y="472" width="250" height="75" rx="8" fill="white" stroke="#4facfe" stroke-width="1.5"/>
  <text x="545" y="495" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a5568">信号灯执行</text>
  <text x="545" y="515" text-anchor="middle" font-size="10" fill="#718096">setPhase / setPhaseDuration</text>
  <text x="545" y="532" text-anchor="middle" font-size="10" fill="#718096">setProgram</text>
  <!-- Feedback -->
  <path d="M250,435 L250,400" stroke="#4facfe" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrB)"/>
  <text x="140" y="420" font-size="10" fill="#4facfe">JointState（上报）</text>
  <text x="400" y="590" text-anchor="middle" font-size="10" fill="#a0aec0">XH-202613 | CA-MP Capacity-Aware MaxPressure | 赛道 B（算法调优型）</text>
</svg>
