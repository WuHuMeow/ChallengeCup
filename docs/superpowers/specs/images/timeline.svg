<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#a29bfe"/><stop offset="100%" stop-color="#6c5ce7"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#74b9ff"/><stop offset="100%" stop-color="#0984e3"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#55efc4"/><stop offset="100%" stop-color="#00b894"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ffeaa7"/><stop offset="100%" stop-color="#fdcb6e"/></linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fab1a0"/><stop offset="100%" stop-color="#e17055"/></linearGradient>
    <linearGradient id="g6" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fd79a8"/><stop offset="100%" stop-color="#e84393"/></linearGradient>
  </defs>
  <rect width="820" height="340" fill="#f8fafc"/>
  <text x="410" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a202c">六周里程碑（7/20 - 8/31）</text>
  <!-- Timeline axis -->
  <line x1="60" y1="60" x2="780" y2="60" stroke="#cbd5e0" stroke-width="2"/>
  <!-- Week markers -->
  <circle cx="120" cy="60" r="5" fill="#6c5ce7"/><text x="120" y="50" text-anchor="middle" font-size="9" fill="#6c5ce7">7/20</text>
  <circle cx="240" cy="60" r="5" fill="#0984e3"/><text x="240" y="50" text-anchor="middle" font-size="9" fill="#0984e3">7/27</text>
  <circle cx="360" cy="60" r="5" fill="#00b894"/><text x="360" y="50" text-anchor="middle" font-size="9" fill="#00b894">8/3</text>
  <circle cx="480" cy="60" r="5" fill="#fdcb6e"/><text x="480" y="50" text-anchor="middle" font-size="9" fill="#b7791f">8/10</text>
  <circle cx="600" cy="60" r="5" fill="#e17055"/><text x="600" y="50" text-anchor="middle" font-size="9" fill="#e17055">8/17</text>
  <circle cx="720" cy="60" r="5" fill="#e84393"/><text x="720" y="50" text-anchor="middle" font-size="9" fill="#e84393">8/24</text>
  <text x="780" y="50" text-anchor="middle" font-size="9" fill="#e53e3e">8/31</text>
  <!-- W1 -->
  <rect x="60" y="80" width="120" height="70" rx="8" fill="url(#g1)" opacity="0.9"/>
  <text x="120" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="white">W1 框架搭建</text>
  <text x="120" y="117" text-anchor="middle" font-size="8" fill="#e2e8f0">接口冻结</text>
  <text x="120" y="131" text-anchor="middle" font-size="8" fill="#e2e8f0">路口1 跑通</text>
  <text x="120" y="145" text-anchor="middle" font-size="8" fill="#e2e8f0">FixedTime+CA-MP</text>
  <!-- W2 -->
  <rect x="185" y="80" width="120" height="70" rx="8" fill="url(#g2)" opacity="0.9"/>
  <text x="245" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="white">W2 算法联调</text>
  <text x="245" y="117" text-anchor="middle" font-size="8" fill="#e2e8f0">云-边-端贯通</text>
  <text x="245" y="131" text-anchor="middle" font-size="8" fill="#e2e8f0">CA-MP 对比数据</text>
  <text x="245" y="145" text-anchor="middle" font-size="8" fill="#e2e8f0">Actuated 完成</text>
  <!-- W3 -->
  <rect x="310" y="80" width="120" height="70" rx="8" fill="url(#g3)" opacity="0.9"/>
  <text x="370" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="white">W3 全量实验</text>
  <text x="370" y="117" text-anchor="middle" font-size="8" fill="#1a202c">20路口×3算法</text>
  <text x="370" y="131" text-anchor="middle" font-size="8" fill="#1a202c">原始流量跑完</text>
  <text x="370" y="145" text-anchor="middle" font-size="8" fill="#1a202c">图表产出</text>
  <!-- W4 -->
  <rect x="435" y="80" width="120" height="70" rx="8" fill="url(#g4)" opacity="0.9"/>
  <text x="495" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a202c">W4 压力测试</text>
  <text x="495" y="117" text-anchor="middle" font-size="8" fill="#1a202c">1.5倍流量</text>
  <text x="495" y="131" text-anchor="middle" font-size="8" fill="#1a202c">EWMA 接入</text>
  <text x="495" y="145" text-anchor="middle" font-size="8" fill="#1a202c">Docker 打包</text>
  <!-- W5 -->
  <rect x="560" y="80" width="120" height="70" rx="8" fill="url(#g5)" opacity="0.9"/>
  <text x="620" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="white">W5 交付制作</text>
  <text x="620" y="117" text-anchor="middle" font-size="8" fill="#fff5f5">报告初稿</text>
  <text x="620" y="131" text-anchor="middle" font-size="8" fill="#fff5f5">PPT 初稿</text>
  <text x="620" y="145" text-anchor="middle" font-size="8" fill="#fff5f5">视频录制</text>
  <!-- W6 -->
  <rect x="685" y="80" width="95" height="70" rx="8" fill="url(#g6)" opacity="0.9"/>
  <text x="732" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="white">W6 打磨</text>
  <text x="732" y="117" text-anchor="middle" font-size="8" fill="#fff5f5">全员review</text>
  <text x="732" y="131" text-anchor="middle" font-size="8" fill="#fff5f5">视频定稿</text>
  <text x="732" y="145" text-anchor="middle" font-size="8" fill="#fff5f5">8/31 提交</text>
  <!-- Key milestones -->
  <text x="60" y="185" font-size="11" font-weight="bold" fill="#4a5568">关键验收节点：</text>
  <rect x="60" y="195" width="700" height="120" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="80" y="218" font-size="10" fill="#4a5568">M1（7/23）：接口冻结 — messages.py + base.py 不再修改</text>
  <text x="80" y="238" font-size="10" fill="#4a5568">M2（7/26）：路口 1 两种算法跑通 3600 步，tag v0.1-w1-complete</text>
  <text x="80" y="258" font-size="10" fill="#4a5568">M3（8/9）：20 路口 × 3 算法 × 原始流量 = 180 次仿真完成</text>
  <text x="80" y="278" font-size="10" fill="#4a5568">M4（8/16）：1.5 倍流量实验完成，EWMA 接入，360 次全量数据就绪</text>
  <text x="80" y="298" font-size="10" fill="#4a5568">M5（8/31）：最终提交 — 报告 + PPT + 视频 + 可运行代码 + Docker</text>
</svg>
