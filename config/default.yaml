project:
  name: "雄安新区城市大脑车路云一体化协同管控算法与仿真平台"
  version: "0.1.0"

paths:
  # 数据根目录。路口数据已随仓库提交，位于 data/intersection_data/。
  # 如需使用本地其他路径，可通过环境变量 CC_DATA_ROOT 覆盖。
  data_root: "./data/intersection_data"
  output_root: "./output"
  model_path: "./ml/model.pkl"

sumo:
  # 批量跑批推荐用命令行版 sumo；需要可视化观察时改为 sumo-gui。
  binary: "sumo"
  step_length: 1.0
  default_simulation_steps: 3600

scene:
  # 20 路口 × 2 流量等级 = 40 个变体
  default_traffic_levels:
    normal: 1.0
    high: 1.5

algorithms:
  fixed_time:
    # true：从 Excel 读取配时方案并写入 SUMO；
    # false：使用 SUMO 路网中自带的默认配时程序。
    use_excel_timing: false

  actuated:
    min_green: 10
    max_green: 60
    queue_threshold: 5

  ca_maxpressure:
    # 溢出门控阈值：进口道占用率超过此值时强制放行
    overflow_occupancy_threshold: 0.9
    # 云端下发参数默认值
    base_green: 30
    min_green: 10
    max_green: 90
    # EWMA 平滑系数
    ewma_alpha: 0.3
    # 云端流量预测时域（秒）
    prediction_horizon: 300

metrics:
  # 每 60 仿真秒记录一次快照，降低 CSV 体积。
  snapshot_interval: 60

logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
