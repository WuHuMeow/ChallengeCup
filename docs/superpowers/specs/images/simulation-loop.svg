<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0984e3"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#95a5a6"/></marker>
  </defs>

  <rect x="240" y="15" width="240" height="46" rx="8" fill="#e8f4fd"/>
  <text x="360" y="35" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">① 数据采集</text>
  <text x="360" y="52" text-anchor="middle" fill="#666" font-size="9">TraCI 读取全景状态 → 写 CSV</text>
  <line x1="360" y1="61" x2="360" y2="85" stroke="#0984e3" stroke-width="1.8" marker-end="url(#a1)"/>

  <rect x="240" y="90" width="240" height="46" rx="8" fill="#fff3e0"/>
  <text x="360" y="110" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">② 算法决策</text>
  <text x="360" y="127" text-anchor="middle" fill="#666" font-size="9">.step(state) → 控制指令</text>
  <line x1="360" y1="136" x2="360" y2="160" stroke="#0984e3" stroke-width="1.8" marker-end="url(#a1)"/>

  <rect x="240" y="165" width="240" height="46" rx="8" fill="#e8f8f0"/>
  <text x="360" y="185" text-anchor="middle" fill="#2c3e50" font-size="13" font-weight="bold">③ 仿真执行</text>
  <text x="360" y="202" text-anchor="middle" fill="#666" font-size="9">TraCI 写入 SUMO · traci.simulationStep()</text>

  <!-- Loop -->
  <path d="M480,188 Q540,188 540,100 Q540,38 480,38" fill="none" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a2)"/>
  <text x="555" y="120" fill="#95a5a6" font-size="9">循环</text>

  <!-- ML branch -->
  <rect x="540" y="80" width="160" height="66" rx="8" fill="#e17055" opacity="0.15"/>
  <text x="620" y="100" text-anchor="middle" fill="#e17055" font-size="9" font-weight="bold">ML 增强路径</text>
  <text x="620" y="118" text-anchor="middle" fill="#e17055" font-size="8">model.predict(features)</text>
  <text x="620" y="134" text-anchor="middle" fill="#e17055" font-size="8">→ 预测流量 → 预调配时</text>
  <path d="M480,113 L530,113" stroke="#e17055" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="505" y="108" fill="#e17055" font-size="7">ML</text>
</svg>