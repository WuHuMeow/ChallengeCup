<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 360" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif">
  <defs><filter id="sd"><feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-opacity="0.12"/></filter></defs>

  <!-- Leads -->
  <rect x="240" y="8" width="300" height="36" rx="8" fill="#2d3436" filter="url(#sd)"/>
  <text x="390" y="31" text-anchor="middle" fill="white" font-size="12" font-weight="bold">🧭 成员6（后端负责）+ 成员7（前端负责）— 兼开发</text>

  <line x1="390" y1="44" x2="390" y2="60" stroke="#2d3436" stroke-width="1.5"/>
  <line x1="162" y1="60" x2="618" y2="60" stroke="#2d3436" stroke-width="1.5"/>
  <line x1="162" y1="60" x2="162" y2="72" stroke="#2d3436" stroke-width="1.5"/>
  <line x1="390" y1="60" x2="390" y2="72" stroke="#2d3436" stroke-width="1.5"/>
  <line x1="618" y1="60" x2="618" y2="72" stroke="#2d3436" stroke-width="1.5"/>

  <!-- Group 1 -->
  <rect x="30" y="74" width="265" height="62" rx="8" fill="#fce4ec" filter="url(#sd)"/>
  <text x="162" y="96" text-anchor="middle" fill="#c0392b" font-size="12" font-weight="bold">🚦 仿真与场景组</text>
  <text x="162" y="113" text-anchor="middle" fill="#666" font-size="10">成员1 + 成员2</text>
  <text x="162" y="128" text-anchor="middle" fill="#888" font-size="9">SUMO · 场景管理 · CSV 数据 · 功能一</text>

  <!-- Group 2 -->
  <rect x="325" y="74" width="265" height="62" rx="8" fill="#e8f4fd" filter="url(#sd)"/>
  <text x="457" y="96" text-anchor="middle" fill="#2471a3" font-size="12" font-weight="bold">🧠 算法与 ML 组（核心）</text>
  <text x="457" y="113" text-anchor="middle" fill="#666" font-size="10">成员3 + 成员4</text>
  <text x="457" y="128" text-anchor="middle" fill="#888" font-size="9">算法接口 · 基线 · ML增强 · 功能二+三</text>

  <!-- Group 3 -->
  <rect x="620" y="74" width="130" height="62" rx="8" fill="#e8f8f0" filter="url(#sd)"/>
  <text x="685" y="96" text-anchor="middle" fill="#27ae60" font-size="12" font-weight="bold">📊 实验分析组</text>
  <text x="685" y="113" text-anchor="middle" fill="#666" font-size="10">成员5 + 成员8</text>
  <text x="685" y="128" text-anchor="middle" fill="#888" font-size="9">跑批 · 统计 · 报告</text>

  <!-- Across bottom: delivery -->
  <rect x="80" y="160" width="620" height="52" rx="8" fill="#e8eaf6" filter="url(#sd)"/>
  <text x="390" y="183" text-anchor="middle" fill="#3f51b5" font-size="12" font-weight="bold">📦 可视化与交付（成员6 + 成员7 主导，全员配合）</text>
  <text x="390" y="200" text-anchor="middle" fill="#666" font-size="10">Matplotlib 报告 · FASTAPI API 文档 · PPT · Demo 视频 · Docker</text>

  <!-- Dependency arrows -->
  <path d="M295,105 L315,105" stroke="#e74c3c" stroke-width="2"/>
  <path d="M590,105 L610,105" stroke="#3498db" stroke-width="2"/>

  <!-- Bottom bar -->
  <rect x="140" y="240" width="500" height="24" rx="5" fill="#2d3436"/>
  <text x="390" y="257" text-anchor="middle" fill="white" font-size="10" font-weight="bold">仿真数据 → ML训练 → 算法集成 → 实验跑批 → 报告图表 → PPT/视频</text>

  <!-- Key difference -->
  <rect x="80" y="282" width="620" height="30" rx="6" fill="#ffeaa7"/>
  <text x="390" y="302" text-anchor="middle" fill="#d35400" font-size="10" font-weight="bold">🔄 vs 赛道A：MQTT通信砍掉 / 三端部署砍掉 / ECharts实时面板→Matplotlib报告 / 人力释放到ML+实验</text>

  <!-- Summary -->
  <rect x="240" y="322" width="300" height="24" rx="4" fill="#636e72"/>
  <text x="390" y="338" text-anchor="middle" fill="white" font-size="10" font-weight="bold">4 组 × 2 人 = 8 人 ｜ 分工明确，串行依赖少</text>
</svg>